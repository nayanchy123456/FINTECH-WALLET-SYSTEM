spring:
  application:
    name: wallet

  datasource:
    url: jdbc:mysql://localhost:3307/wallet_system?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
    username: wallet_user
    password: wallet_pass
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        format_sql: true

server:
  port: 8080